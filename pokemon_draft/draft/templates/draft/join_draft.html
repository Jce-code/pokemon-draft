<!DOCTYPE html>
<html>
<head>
    <title>Join Draft</title>
</head>
<body>
    <h1>Join Draft</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Choose your player:</label>
        <select name="player_id" required>
            {% for player in players %}
                <option value="{{ player.id }}">{{ player.name }}</option>
            {% endfor %}
        </select>

        <button type="submit">Join Draft</button>
    </form>
</body>
</html>
